<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Logbook — Biro PnD IKPIA Perbanas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:     #0d2b4e;
    --navy-mid: #1a4a7a;
    --navy-lt:  #e6eef7;
    --gold:     #c8a84b;
    --gold-lt:  #fdf6e3;
    --hijau:    #1a6b4a;
    --hijau-lt: #d4f0e5;
    --hijau-br: #22a06b;
    --abu:      #6b7280;
    --abu-lt:   #f4f6f8;
    --abu-br:   #d1d9e0;
    --kuning:   #d97706;
    --merah:    #c0392b;
    --putih:    #ffffff;
    --teks:     #1a2433;
    --teks-sub: #5a6678;
    --radius:   12px;
    --shadow:   0 4px 24px rgba(13,43,78,.10);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--abu-lt);
    color: var(--teks);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, var(--navy) 0%, #0a2240 40%, #1a3a5c 100%);
    padding: 20px;
  }
  .login-card {
    background: var(--putih);
    border-radius: 20px;
    padding: 52px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,.28);
    text-align: center;
    border-top: 5px solid var(--gold);
  }
  .login-logo-wrap {
    margin: 0 auto 20px;
    display: flex;
    justify-content: center;
  }
  .login-logo-wrap img {
    height: 90px;
    width: auto;
    object-fit: contain;
  }
  .login-card h1 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 4px;
    letter-spacing: .3px;
  }
  .login-card .login-sub {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    color: var(--teks-sub);
    margin-bottom: 10px;
  }
  .login-divider {
    width: 48px;
    height: 3px;
    background: var(--gold);
    margin: 14px auto 28px;
    border-radius: 2px;
  }
  .pin-label {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--teks-sub);
    text-align: left;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .pin-input {
    width: 100%;
    padding: 16px 18px;
    border: 2px solid var(--abu-br);
    border-radius: 10px;
    font-size: 26px;
    letter-spacing: 10px;
    text-align: center;
    color: var(--navy);
    font-weight: 700;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 16px;
    font-family: 'Arial', sans-serif;
  }
  .pin-input:focus { border-color: var(--navy-mid); box-shadow: 0 0 0 3px rgba(26,74,122,.12); }
  .pin-input.error { border-color: var(--merah); animation: shake .3s; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-8px)}
    75%{transform:translateX(8px)}
  }
  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--navy-mid), var(--navy));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Arial', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .btn-login:hover { opacity: .88; }
  .btn-login:active { transform: scale(.98); }
  .error-msg {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: var(--merah);
    margin-top: 10px;
    min-height: 18px;
    font-weight: 600;
  }

  /* ── APP SCREEN ── */
  #app-screen { display: none; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    color: white;
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 16px rgba(13,43,78,.22);
    border-bottom: 3px solid var(--gold);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    gap: 20px;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-logo-wrap img {
    height: 44px;
    width: auto;
    object-fit: contain;
    display: block;
    filter: brightness(0) invert(1);
  }
  .header-divider {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,.25);
  }
  .header-title {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: white;
    letter-spacing: .3px;
    line-height: 1.2;
  }
  .header-sub {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,.70);
    margin-top: 2px;
    letter-spacing: .3px;
    text-transform: uppercase;
  }
  .header-date {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,.85);
    font-weight: 600;
    white-space: nowrap;
    background: rgba(255,255,255,.10);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.15);
  }

  /* NAV TABS */
  .nav {
    background: var(--putih);
    border-bottom: 2px solid var(--abu-br);
    display: flex;
    padding: 0 32px;
    gap: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .nav-tab {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--teks-sub);
    background: none;
    border: none;
    padding: 16px 24px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color .2s, border-color .2s;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .nav-tab:hover { color: var(--navy); }
  .nav-tab.active {
    color: var(--navy);
    border-bottom-color: var(--gold);
  }

  /* MAIN */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* ALERT */
  .alert {
    font-family: 'Arial', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 20px;
    border-radius: 10px;
    margin-bottom: 24px;
    border-left: 4px solid;
  }
  .alert-warn { background: #fef9e7; color: #92400e; border-left-color: var(--kuning); }
  .alert-ok   { background: var(--hijau-lt); color: var(--hijau); border-left-color: var(--hijau-br); }

  /* CARDS */
  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--putih);
    border-radius: var(--radius);
    padding: 24px 22px 20px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--card-accent, var(--navy-mid));
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 60px; height: 60px;
    background: var(--card-accent, var(--navy-mid));
    opacity: .05;
    border-radius: 50% 0 0 0;
  }
  .card-label {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--teks-sub);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .card-val {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--card-color, var(--navy));
    line-height: 1;
    margin-bottom: 8px;
  }
  .card-val span {
    font-size: 22px;
    color: var(--teks-sub);
    font-weight: 400;
  }
  .card-sub {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: var(--teks-sub);
    font-weight: 500;
  }

  /* TABLE */
  .table-wrap {
    background: var(--putih);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .table-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px 14px;
    border-bottom: 2px solid var(--abu-lt);
  }
  .table-head h3 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: .2px;
  }
  .table-head-sub {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: var(--abu);
    font-weight: 600;
  }
  .btn-refresh {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--navy-mid);
    background: var(--navy-lt);
    border: 1px solid var(--abu-br);
    border-radius: 7px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background .2s;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .btn-refresh:hover { background: var(--abu-br); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Arial', sans-serif;
  }
  thead tr {
    background: var(--navy);
  }
  thead th {
    padding: 13px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,.90);
    text-transform: uppercase;
    letter-spacing: .8px;
    border: none;
  }
  tbody tr {
    border-bottom: 1px solid var(--abu-lt);
    transition: background .15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--navy-lt); }
  tbody tr.row-click { cursor: pointer; }
  tbody td {
    padding: 14px 16px;
    font-size: 13px;
    color: var(--teks);
    font-weight: 500;
  }

  /* AVATAR */
  .name-cell { display: flex; align-items: center; gap: 12px; }
  .av {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .5px;
    flex-shrink: 0;
  }
  .av-biru  { background: var(--navy-lt); color: var(--navy); }
  .av-hijau { background: var(--hijau-lt); color: var(--hijau); }
  .av-abu   { background: var(--abu-lt); color: var(--teks-sub); }

  /* BADGE */
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 6px;
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .4px;
    text-transform: uppercase;
  }
  .badge-green  { background: var(--hijau-lt); color: var(--hijau); }
  .badge-amber  { background: #fef3cd; color: #92400e; }
  .badge-red    { background: #fdecea; color: var(--merah); }
  .badge-gray   { background: var(--abu-lt); color: var(--abu); }

  /* CHART */
  .chart-section {
    background: var(--putih);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .chart-title {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 22px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--abu-lt);
  }
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 130px;
    overflow-x: auto;
    padding: 0 4px 4px;
  }
  .bar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 28px;
    max-width: 56px;
  }
  .bar-stack {
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    width: 100%;
    gap: 0;
  }
  .bar-seg {
    width: 80%;
    border-radius: 4px 4px 0 0;
    min-height: 4px;
  }
  .bar-lbl {
    font-family: 'Arial', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--teks-sub);
    text-align: center;
  }
  .chart-legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--teks-sub);
  }
  .leg { display: flex; align-items: center; gap: 7px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 3px; }
  .progress-row { margin-bottom: 14px; }
  .progress-row-head {
    display: flex;
    justify-content: space-between;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .progress-track {
    height: 8px;
    background: var(--abu-lt);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .6s ease;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--teks-sub);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .filter-bar input[type=date] {
    border: 2px solid var(--abu-br);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    outline: none;
    background: var(--putih);
  }
  .filter-bar input[type=date]:focus { border-color: var(--navy-mid); }

  /* STAT CARD */
  .stat-card {
    background: var(--putih);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: flex-start;
    gap: 18px;
    margin-bottom: 16px;
    border-left: 4px solid var(--navy-mid);
  }
  .stat-av {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Arial', sans-serif;
    font-size: 15px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .stat-info { flex: 1; }
  .stat-name {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 3px;
  }
  .stat-sub {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: var(--teks-sub);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
    margin-bottom: 10px;
  }
  .stat-nums {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .stat-num {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: var(--teks-sub);
    font-weight: 500;
  }
  .stat-num strong {
    color: var(--teks);
    font-weight: 700;
  }
  .stat-pct {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 30px;
    font-weight: 700;
    min-width: 60px;
    text-align: right;
  }

  /* DETAIL VIEW */
  .detail-back {
    display: inline-block;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--navy-mid);
    cursor: pointer;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: .4px;
    padding: 8px 16px;
    background: var(--navy-lt);
    border-radius: 7px;
    transition: background .15s;
  }
  .detail-back:hover { background: var(--abu-br); }
  .detail-header {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--putih);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--gold);
  }
  .detail-header > div:last-child > div:first-child {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--navy);
  }
  .detail-grid {
    background: var(--putih);
    border-radius: var(--radius);
    padding: 8px 0;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .detail-item {
    padding: 16px 24px;
    border-bottom: 1px solid var(--abu-lt);
  }
  .detail-item.full { grid-column: 1 / -1; }
  .detail-label {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--teks-sub);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 5px;
  }
  .detail-val {
    font-family: 'Arial', sans-serif;
    font-size: 14px;
    color: var(--teks);
    font-weight: 500;
    line-height: 1.6;
  }
  .detail-empty { color: var(--abu); font-style: italic; }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 18px;
    font-family: 'Arial', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--teks-sub);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid var(--abu-br);
    border-top-color: var(--navy-mid);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    font-family: 'Arial', sans-serif;
    color: var(--teks-sub);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 14px; }
  .empty-state p { font-size: 14px; font-weight: 600; line-height: 1.7; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .cards { grid-template-columns: 1fr 1fr; }
    .header { padding: 0 16px; }
    .main { padding: 20px 12px 50px; }
    .nav { padding: 0 12px; }
    .nav-tab { padding: 14px 14px; font-size: 11px; }
    .detail-grid { grid-template-columns: 1fr; }
    .stat-card { flex-wrap: wrap; }
    .header-date { display: none; }
  }
  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr 1fr; }
    .login-card { padding: 36px 24px; }
    .card-val { font-size: 32px; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">

const PIN_BENAR = '181818';
const API_URL   = 'https://script.google.com/a/macros/perbanas.id/s/AKfycbwM6aNxSWVqPG_DObf3ptaE786rBXNaotS7xuM7Jew8rEnXZrP784G9omXSz085aCLK/exec';

// ═══════════════════
//  STATE
// ═══════════════════
let activeTab = 'hari_ini';
let dataCache = {};
let detailCtx = null;

// ═══════════════════
//  LOGIN
// ═══════════════════
function doLogin() {
  const val = document.getElementById('pin-input').value.trim();
  const inp = document.getElementById('pin-input');
  const err = document.getElementById('error-msg');
  if (val === PIN_BENAR) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display   = 'block';
    initApp();
  } else {
    inp.classList.add('error');
    err.textContent = 'PIN salah. Coba lagi.';
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 400);
  }
}

// ═══════════════════
//  INIT
// ═══════════════════
function initApp() {
  setHeaderDate();
  loadTab('hari_ini');
}

function setHeaderDate() {
  const HARI  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const d = new Date();
  document.getElementById('header-date').textContent =
    `${HARI[d.getDay()]}, ${d.getDate()} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
}

// ═══════════════════
//  TAB NAVIGATION
// ═══════════════════
function showTab(tab, btn) {
  activeTab = tab;
  detailCtx = null;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadTab(tab);
}

function loadTab(tab, force) {
  if (!force && dataCache[tab]) { renderTab(tab, dataCache[tab]); return; }
  showLoading();
  fetchApi(tab).then(data => { dataCache[tab] = data; renderTab(tab, data); }).catch(showError);
}

// ═══════════════════
//  API FETCH
// ═══════════════════
function fetchApi(action, extra) {
  return new Promise(function(resolve, reject) {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    let url = `${API_URL}?mode=api&action=${action}&callback=${cbName}`;
    if (extra) Object.entries(extra).forEach(([k,v]) => url += `&${k}=${encodeURIComponent(v)}`);
    window[cbName] = function(data) { delete window[cbName]; script.remove(); resolve(data); };
    const script = document.createElement('script');
    script.src = url;
    script.onerror = function() { delete window[cbName]; script.remove(); reject(new Error('Gagal terhubung ke server.')); };
    document.head.appendChild(script);
  });
}

// ═══════════════════
//  HELPERS
// ═══════════════════
function showLoading() {
  document.getElementById('main-content').innerHTML =
    `<div class="loading"><div class="spinner"></div><p>Memuat data…</p></div>`;
}
function showError(err) {
  document.getElementById('main-content').innerHTML =
    `<div class="empty-state"><div class="icon">⚠️</div><p>Gagal memuat data.<br><small>${err}</small></p></div>`;
}
function setContent(html) { document.getElementById('main-content').innerHTML = html; }

function inisial(nama) {
  return (nama||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
}
function avClass(jabatan) {
  if ((jabatan||'').includes('Biro'))  return 'av-biru';
  if ((jabatan||'').includes('Kabag')) return 'av-hijau';
  return 'av-abu';
}
function badgeStatus(p) {
  if (!p.sudahSubmit) return `<span class="badge badge-red">✕ Belum Submit</span>`;
  if (p.terlambat)    return `<span class="badge badge-amber">⚠ Terlambat</span>`;
  return `<span class="badge badge-green">✓ Tepat Waktu</span>`;
}
function badgeStr(status) {
  if (status==='Submit')       return `<span class="badge badge-green">✓ Submit</span>`;
  if (status==='Terlambat')    return `<span class="badge badge-amber">⚠ Terlambat</span>`;
  if (status==='Tidak Submit') return `<span class="badge badge-red">✕ Tidak Submit</span>`;
  return `<span class="badge badge-gray">—</span>`;
}
function pctColor(pct) {
  return pct>=90?'var(--hijau-br)':pct>=70?'var(--kuning)':'var(--merah)';
}
function tglPendek(str) {
  if (!str) return '—';
  const d = new Date(str+'T00:00:00');
  const B = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const H = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  return `${H[d.getDay()]} ${d.getDate()} ${B[d.getMonth()]}`;
}
function tglPanjang(str) {
  if (!str) return '—';
  const HARI  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const d = new Date(str+'T00:00:00');
  return `${HARI[d.getDay()]}, ${d.getDate()} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
}
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════
//  RENDER TABS
// ═══════════════════
function renderTab(tab, data) {
  if (tab==='hari_ini')  renderHariIni(data);
  if (tab==='tren')      renderTren(data);
  if (tab==='history')   renderHistory(data);
  if (tab==='statistik') renderStatistik(data);
}

// TAB: HARI INI
function renderHariIni(data) {
  const personil  = data.personil||[];
  const submit    = personil.filter(p=>p.sudahSubmit).length;
  const terlambat = personil.filter(p=>p.terlambat).length;
  const tepat     = submit - terlambat;
  const belum     = personil.length - submit;
  const pct       = personil.length>0?Math.round(submit/personil.length*100):0;

  const alert = belum>0
    ? `<div class="alert alert-warn">⚠️ <strong>${belum} personil</strong> belum submit logbook hari ini.</div>`
    : `<div class="alert alert-ok">✅ Semua personil sudah submit logbook hari ini.</div>`;

  const rows = personil.map(p=>`
    <tr class="row-click" onclick="showDetail('${escHtml(p.nama)}','${data.tanggal}','hari_ini')">
      <td><div class="name-cell">
        <div class="av ${avClass(p.jabatan)}">${inisial(p.nama)}</div>
        <span style="font-weight:600">${escHtml(p.nama)}</span>
      </div></td>
      <td style="color:var(--teks-sub);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px">${escHtml(p.jabatan)}</td>
      <td style="color:var(--teks-sub);font-size:12px">${escHtml(p.bagian)}</td>
      <td>${badgeStatus(p)}</td>
      <td style="font-size:13px;color:var(--teks-sub);font-weight:600">${p.jamSubmit?p.jamSubmit+' WIB':'—'}</td>
      <td style="color:var(--gold);font-size:12px;font-weight:700">DETAIL →</td>
    </tr>`).join('');

  setContent(`
    ${alert}
    <div class="cards">
      <div class="card" style="--card-accent:var(--navy-mid);--card-color:var(--navy)">
        <div class="card-label">Submit Hari Ini</div>
        <div class="card-val">${submit}<span>/${personil.length}</span></div>
        <div class="card-sub">${pct}% compliance</div>
      </div>
      <div class="card" style="--card-accent:var(--hijau-br);--card-color:var(--hijau)">
        <div class="card-label">Tepat Waktu</div>
        <div class="card-val">${tepat}</div>
        <div class="card-sub">sebelum 15.30 WIB</div>
      </div>
      <div class="card" style="--card-accent:${belum>0?'var(--kuning)':'var(--hijau-br)'};--card-color:${belum>0?'var(--kuning)':'var(--hijau)'}">
        <div class="card-label">Belum Submit</div>
        <div class="card-val">${belum}</div>
        <div class="card-sub">${belum>0?'perlu perhatian':'semua sudah'}</div>
      </div>
      <div class="card" style="--card-accent:${terlambat>0?'var(--merah)':'var(--hijau-br)'};--card-color:${terlambat>0?'var(--merah)':'var(--hijau)'}">
        <div class="card-label">Terlambat</div>
        <div class="card-val">${terlambat}</div>
        <div class="card-sub">${terlambat>0?'setelah 15.30 WIB':'tidak ada'}</div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <h3>Status Per Personil</h3>
        <button class="btn-refresh" onclick="loadTab('hari_ini',true)">↻ Refresh</button>
      </div>
      <table>
        <thead><tr>
          <th>Nama</th><th>Jabatan</th><th>Bagian</th><th>Status</th><th>Jam Submit</th><th></th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--abu);padding:32px;font-family:Arial,sans-serif">Tidak ada data personil.</td></tr>'}</tbody>
      </table>
    </div>`);
}

// TAB: TREN
function renderTren(data) {
  const tren = data.data||[];
  if (!tren.length) {
    setContent(`<div class="empty-state"><div class="icon">📊</div><p>Belum ada data tren.<br>Data akan muncul setelah rekap harian berjalan (jam 16.00).</p></div>`);
    return;
  }
  const total = 6;
  const barH  = 100;
  const bars  = tren.map(d => {
    const hOk   = Math.round((d.submit    /total)*barH);
    const hLate = Math.round((d.terlambat /total)*barH);
    const hMiss = Math.round((d.tidakSubmit/total)*barH);
    const lbl   = tglPendek(d.tgl).replace(/^\w+ /,'');
    return `<div class="bar-col" title="${tglPendek(d.tgl)}: ✓${d.submit} ⚠${d.terlambat} ✕${d.tidakSubmit}">
      <div class="bar-stack">
        ${hMiss >0?`<div class="bar-seg" style="height:${hMiss}px;background:var(--merah)"></div>`:''}
        ${hLate >0?`<div class="bar-seg" style="height:${hLate}px;background:var(--kuning);border-radius:0"></div>`:''}
        ${hOk   >0?`<div class="bar-seg" style="height:${hOk}px;background:var(--hijau-br);${hLate||hMiss?'border-radius:0':''}"></div>`:''}
      </div>
      <div class="bar-lbl">${lbl}</div>
    </div>`;
  }).join('');

  const progRows = tren.slice(-10).map(d => {
    const ok  = d.submit+d.terlambat;
    const pct = Math.round(ok/total*100);
    const col = pctColor(pct);
    return `<div class="progress-row">
      <div class="progress-row-head">
        <span style="color:var(--teks-sub);font-weight:600">${tglPendek(d.tgl)}</span>
        <span style="font-weight:700;color:${col}">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>
    </div>`;
  }).join('');

  setContent(`
    <div class="chart-section">
      <div class="chart-title">Jumlah Submit per Hari (30 hari terakhir)</div>
      <div class="bar-chart">${bars}</div>
      <div class="chart-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--hijau-br)"></div>Tepat Waktu</div>
        <div class="leg"><div class="leg-dot" style="background:var(--kuning)"></div>Terlambat</div>
        <div class="leg"><div class="leg-dot" style="background:var(--merah)"></div>Tidak Submit</div>
      </div>
    </div>
    <div class="chart-section">
      <div class="chart-title">Tingkat Kepatuhan — 10 Hari Terakhir</div>
      ${progRows}
    </div>`);
}

// TAB: HISTORY
function renderHistory(data, selectedTgl) {
  const rekap = data.data||[];
  const today = new Date().toISOString().split('T')[0];
  const tgl   = selectedTgl||today;

  const rows = rekap.length===0
    ? `<tr><td colspan="7" style="text-align:center;color:var(--abu);padding:40px;font-family:Arial,sans-serif;font-weight:600">Tidak ada data untuk tanggal ini.</td></tr>`
    : rekap.map(r=>`
      <tr class="row-click" onclick="showDetail('${escHtml(r.nama)}','${r.tanggal}','history')">
        <td style="font-size:12px;color:var(--teks-sub);font-weight:600">${tglPendek(r.tanggal)}</td>
        <td><div class="name-cell">
          <div class="av ${avClass(r.jabatan)}">${inisial(r.nama)}</div>
          <span style="font-weight:600">${escHtml(r.nama)}</span>
        </div></td>
        <td style="font-size:12px;color:var(--teks-sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px">${escHtml(r.jabatan)}</td>
        <td style="font-size:12px;color:var(--teks-sub)">${escHtml(r.bagian)}</td>
        <td>${badgeStr(r.status)}</td>
        <td style="font-size:13px;color:var(--teks-sub);font-weight:600">${r.jamSubmit||'—'}</td>
        <td style="color:var(--gold);font-size:12px;font-weight:700">DETAIL →</td>
      </tr>`).join('');

  setContent(`
    <div class="filter-bar">
      <label>Tanggal:</label>
      <input type="date" value="${tgl}" onchange="filterHistory(this.value)">
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <h3>History Submit${tgl?' — '+tglPendek(tgl):''}</h3>
        <span class="table-head-sub">${rekap.length} entri</span>
      </div>
      <table>
        <thead><tr>
          <th>Tanggal</th><th>Nama</th><th>Jabatan</th><th>Bagian</th><th>Status</th><th>Jam</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`);
}

function filterHistory(tgl) {
  showLoading();
  fetchApi('history',{tgl}).then(data=>renderHistory(data,tgl)).catch(showError);
}

// TAB: STATISTIK
function renderStatistik(data) {
  const stats = data.data||[];
  if (!stats.length) {
    setContent(`<div class="empty-state"><div class="icon">👥</div><p>Belum ada data statistik.<br>Data akan muncul setelah rekap harian berjalan.</p></div>`);
    return;
  }
  const cards = stats.map(s => {
    const ok  = s.submit+s.terlambat;
    const pct = s.total>0?Math.round(ok/s.total*100):0;
    const col = pctColor(pct);
    const bg  = s.jabatan.includes('Biro')?'var(--navy-lt)':s.jabatan.includes('Kabag')?'var(--hijau-lt)':'var(--abu-lt)';
    const fg  = s.jabatan.includes('Biro')?'var(--navy)':s.jabatan.includes('Kabag')?'var(--hijau)':'var(--teks-sub)';
    return `<div class="stat-card">
      <div class="stat-av" style="background:${bg};color:${fg}">${inisial(s.nama)}</div>
      <div class="stat-info">
        <div class="stat-name">${escHtml(s.nama)}</div>
        <div class="stat-sub">${escHtml(s.jabatan)} — ${escHtml(s.bagian)}</div>
        <div class="stat-nums">
          <span class="stat-num">✓ Tepat Waktu: <strong>${s.submit}</strong></span>
          <span class="stat-num">⚠ Terlambat: <strong>${s.terlambat}</strong></span>
          <span class="stat-num">✕ Tidak Submit: <strong>${s.tidakSubmit}</strong></span>
          <span class="stat-num">Total: <strong>${s.total}</strong> hari</span>
        </div>
        <div style="margin-top:12px">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>
        </div>
      </div>
      <div class="stat-pct" style="color:${col}">${pct}%</div>
    </div>`;
  }).join('');

  setContent(`
    <div style="font-family:Arial,sans-serif;font-size:13px;color:var(--teks-sub);margin-bottom:20px;font-weight:500">
      Tingkat kepatuhan masing-masing personil sepanjang waktu.
    </div>
    ${cards}`);
}

// DETAIL LOGBOOK
function showDetail(nama, tgl, fromTab) {
  detailCtx = { nama, tgl, fromTab };
  showLoading();
  fetchApi('detail',{nama,tgl}).then(data=>renderDetail(data.data,nama,tgl)).catch(showError);
}

function renderDetail(detail, nama, tgl) {
  if (!detail) {
    setContent(`
      <span class="detail-back" onclick="backFromDetail()">← Kembali</span>
      <div class="empty-state"><div class="icon">📋</div>
      <p>Belum ada data logbook untuk <strong>${escHtml(nama)}</strong><br>pada ${tglPanjang(tgl)}.</p></div>`);
    return;
  }
  const skip = ['Timestamp','timestamp',''];
  const items = Object.entries(detail)
    .filter(([k,v]) => !skip.includes(k) && v!=='' && v!==null && v!==undefined)
    .map(([k,v]) => {
      const val    = (v instanceof Object&&v.toString)?v.toString():String(v);
      const isLong = val.length>60;
      return `<div class="detail-item${isLong?' full':''}">
        <div class="detail-label">${escHtml(k)}</div>
        <div class="detail-val">${escHtml(val)||'<span class="detail-empty">(tidak diisi)</span>'}</div>
      </div>`;
    }).join('');

  setContent(`
    <span class="detail-back" onclick="backFromDetail()">← Kembali</span>
    <div class="detail-header">
      <div class="av ${avClass('')}" style="width:50px;height:50px;font-size:14px;border-radius:14px">${inisial(nama)}</div>
      <div>
        <div>${escHtml(nama)}</div>
        <div style="font-family:Arial,sans-serif;font-size:13px;color:var(--teks-sub);margin-top:3px;font-weight:600">${tglPanjang(tgl)}</div>
      </div>
    </div>
    <div class="detail-grid">${items||'<div class="detail-item full"><div class="detail-val detail-empty">Tidak ada data yang dapat ditampilkan.</div></div>'}</div>`);
}

function backFromDetail() {
  if (!detailCtx) { showTab('hari_ini',document.querySelector('.nav-tab')); return; }
  const { fromTab } = detailCtx;
  detailCtx = null;
  const btns = document.querySelectorAll('.nav-tab');
  const map  = { hari_ini:0, tren:1, history:2, statistik:3 };
  btns.forEach(b=>b.classList.remove('active'));
  if (btns[map[fromTab]]) btns[map[fromTab]].classList.add('active');
  activeTab = fromTab;
  if (dataCache[fromTab]) renderTab(fromTab,dataCache[fromTab]);
  else loadTab(fromTab);
}

// Session restore
if (sessionStorage.getItem('logbook_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display   = 'block';
  initApp();
}
</script>
</body>
